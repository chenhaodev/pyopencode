name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e '.[dev]'
      - name: Ruff
        run: ruff check pyopencode/ tests/
      - name: Pytest
        run: pytest tests/ -q -m "not integration"

  lsp-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install pyright (pyright-langserver)
        run: npm install -g pyright
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: pip install -e '.[dev]'
      - name: LSP integration tests
        run: pytest tests/test_lsp_integration.py -q -m integration
        env:
          PYOPENCODE_RUN_LSP_INTEGRATION: "1"
