name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}
      - name: Lockfile up to date
        run: uv lock --check
      - name: Sync deps (locked)
        run: uv sync --frozen --extra dev
      - name: Ruff
        run: uv run ruff check pyopencode/ tests/
      - name: Pytest
        run: uv run pytest tests/ -q -m "not integration"

  lsp-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install pyright (pyright-langserver)
        run: npm install -g pyright
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.12"
      - name: Lockfile up to date
        run: uv lock --check
      - name: Sync deps (locked)
        run: uv sync --frozen --extra dev
      - name: LSP integration tests
        run: uv run pytest tests/test_lsp_integration.py -q -m integration
        env:
          PYOPENCODE_RUN_LSP_INTEGRATION: "1"
